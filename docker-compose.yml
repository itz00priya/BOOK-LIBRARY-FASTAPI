services:
  db:
    image: postgres:15
    container_name: book_library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 'Qsefthuko321!@#'   
      POSTGRES_DB: book_library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: book_library_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=book_library_db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD='Qsefthuko321!@#'
      - DB_NAME=book_library
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:

